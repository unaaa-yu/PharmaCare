<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PharmaCare AI — Care Plan Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #1a1a2e; }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 18px 32px;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .container { max-width: 800px; margin: 40px auto; padding: 0 16px; }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #4a90d9;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eef0f5;
    }

    h2 { font-size: 1.1rem; color: #444; margin-bottom: 24px; font-weight: 500; }

    label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 6px; }
    .hint { font-size: 0.75rem; color: #999; font-weight: 400; margin-left: 4px; }

    input, textarea {
      width: 100%;
      border: 1px solid #dde1e8;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.95rem;
      margin-bottom: 18px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: #4a90d9; }
    textarea { resize: vertical; min-height: 80px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .list-field { margin-bottom: 18px; }
    .list-items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .list-item { display: flex; gap: 8px; align-items: center; }
    .list-item input { margin-bottom: 0; flex: 1; }
    .remove-btn {
      background: none;
      border: 1px solid #dde1e8;
      border-radius: 6px;
      color: #999;
      cursor: pointer;
      padding: 8px 12px;
      font-size: 1rem;
      line-height: 1;
      width: auto;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .remove-btn:hover { border-color: #e74c3c; color: #e74c3c; background: #fff5f5; }
    .add-btn {
      background: none;
      border: 1px dashed #4a90d9;
      border-radius: 6px;
      color: #4a90d9;
      cursor: pointer;
      padding: 8px 14px;
      font-size: 0.85rem;
      font-weight: 600;
      width: auto;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .add-btn:hover { background: #f0f7ff; }

    .toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .toggle-btn {
      padding: 7px 16px;
      border: 1px solid #dde1e8;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      color: #888;
      width: auto;
      transition: all 0.2s;
    }
    .toggle-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }

    .records-panel { display: none; }
    .records-panel.active { display: block; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #2d2d4e; }
    .submit-btn:disabled { background: #999; cursor: not-allowed; }

    #status { text-align: center; color: #666; margin: 16px 0; font-size: 0.9rem; display: none; }

    #result {
      background: #fff;
      border-radius: 10px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: none;
    }
    #result h3 { font-size: 1rem; color: #1a1a2e; margin-bottom: 16px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
    #plan-text { white-space: pre-wrap; font-size: 0.9rem; line-height: 1.7; color: #333; }
  </style>
</head>
<body>

<header>PharmaCare AI</header>

<div class="container">
  <div class="card">
    <h2>Patient Care Plan Generator</h2>
    <form id="form" enctype="multipart/form-data">

      <div class="section-title">Patient Information</div>
      <div class="row">
        <div>
          <label>First Name</label>
          <input type="text" name="patient_first_name" placeholder="e.g. Jane" required>
        </div>
        <div>
          <label>Last Name</label>
          <input type="text" name="patient_last_name" placeholder="e.g. Smith" required>
        </div>
      </div>
      <div>
        <label>Patient MRN <span class="hint">6-digit unique ID</span></label>
        <input type="text" name="patient_mrn" placeholder="e.g. 482910" pattern="\d{6}" maxlength="6" required>
      </div>

      <div class="section-title">Referring Provider</div>
      <div class="row">
        <div>
          <label>Provider Name</label>
          <input type="text" name="referring_provider" placeholder="e.g. Dr. Michael Lee" required>
        </div>
        <div>
          <label>CPSO Number <span class="hint">6-digit number</span></label>
          <input type="text" name="referring_provider_npi" placeholder="e.g. 123456" pattern="\d{6}" maxlength="6" required>
        </div>
      </div>

      <div class="section-title">Diagnoses</div>
      <div>
        <label>Primary Diagnosis <span class="hint">ICD-10 code</span></label>
        <input type="text" name="primary_diagnosis" placeholder="e.g. E11.9" required>
      </div>

      <div class="list-field">
        <label>Additional Diagnoses <span class="hint">ICD-10 codes</span></label>
        <div class="list-items" id="additional-diagnoses-list"></div>
        <button type="button" class="add-btn" onclick="addItem('additional-diagnoses-list', 'additional_diagnoses[]', 'e.g. I10')">+ Add Diagnosis</button>
      </div>

      <div class="section-title">Medications</div>
      <div>
        <label>Medication Name</label>
        <input type="text" name="medication_name" placeholder="e.g. Metformin 1000mg BID" required>
      </div>

      <div class="list-field">
        <label>Medication History</label>
        <div class="list-items" id="medication-history-list"></div>
        <button type="button" class="add-btn" onclick="addItem('medication-history-list', 'medication_history[]', 'e.g. Lisinopril 10mg QD (discontinued 2023)')">+ Add Medication</button>
      </div>

      <div class="section-title">Patient Records</div>
      <div class="toggle-row">
        <button type="button" class="toggle-btn active" onclick="switchRecords('text', this)">Text / Notes</button>
        <button type="button" class="toggle-btn" onclick="switchRecords('file', this)">Upload PDF</button>
      </div>
      <div class="records-panel active" id="records-text">
        <textarea name="patient_records_text" placeholder="Paste relevant clinical notes, lab results, or history…"></textarea>
      </div>
      <div class="records-panel" id="records-file">
        <input type="file" name="patient_records_file" accept=".pdf">
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Generate Care Plan</button>
    </form>
  </div>

  <p id="status">Generating care plan with AI — this may take 15–30 seconds…</p>

  <div id="result">
    <h3>AI-Generated Care Plan</h3>
    <div id="plan-text"></div>
  </div>
</div>

<script>
  function addItem(listId, inputName, placeholder) {
    const list = document.getElementById(listId);
    const item = document.createElement("div");
    item.className = "list-item";
    item.innerHTML = `
      <input type="text" name="${inputName}" placeholder="${placeholder}">
      <button type="button" class="remove-btn" onclick="this.parentElement.remove()">✕</button>
    `;
    list.appendChild(item);
    item.querySelector("input").focus();
  }

  function switchRecords(mode, btn) {
    document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".records-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("records-" + mode).classList.add("active");
  }

  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submit-btn");
    const status = document.getElementById("status");
    const result = document.getElementById("result");
    const planText = document.getElementById("plan-text");

    const fd = new FormData(e.target);

    ["additional_diagnoses[]", "medication_history[]"].forEach(name => {
      const values = fd.getAll(name).filter(v => v.trim());
      fd.delete(name);
      fd.set(name.replace("[]", ""), values.join("\n"));
    });

    btn.disabled = true;
    btn.textContent = "Generating…";
    status.style.display = "block";
    result.style.display = "none";

    const res = await fetch("/generate/", { method: "POST", body: fd });
    const data = await res.json();

    status.style.display = "none";
    btn.disabled = false;
    btn.textContent = "Generate Care Plan";

    planText.textContent = data.plan;
    result.style.display = "block";
    result.scrollIntoView({ behavior: "smooth" });
  });
</script>

</body>
</html>
